name: Update Scholar README

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Update README from Google Scholar
        env:
          SCHOLAR_USER_ID: H8LRCN8AAAAJ
          SCHOLAR_LANG: en
          SCHOLAR_MAX_PAPERS: '5'
        run: python scripts/update_scholar_readme.py

      - name: Commit updated README
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'docs: refresh Google Scholar papers'
          file_pattern: README.md