name: Update Scholar README

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Update README from Google Scholar
        env:
          SCHOLAR_USER_ID: H8LRCN8AAAAJ
          SCHOLAR_LANG: en
          SCHOLAR_MAX_PAPERS: '5'
        run: python scripts/update_scholar_readme.py

      - name: Commit and push README update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- README.md; then
            echo "No README changes to commit."
            exit 0
          fi

          git add README.md
          git commit -m "docs: refresh Google Scholar papers"
          git pull --rebase origin main
          git push origin HEAD:main